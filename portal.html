<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loopline</title>
  <link rel="stylesheet" href="assets/loop.css" />
  <style>
    /* Portal-specific layout */
    .portal-shell { display: flex; flex-direction: column; min-height: 100vh; }

    /* Topbar workspace name */
    .topbar-ws { font-size: 14px; font-weight: 600; color: var(--ink-2); margin-left: 2px; }
    .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .topbar-center { display: flex; align-items: center; gap: 0; }

    /* Feedback layout: sidebar + main */
    .feedback-layout { display: flex; gap: 20px; padding: 28px 0 60px; align-items: flex-start; }
    .sidebar { width: 200px; flex-shrink: 0; }
    .sidebar-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--mut); margin-bottom: 10px; padding: 0 8px; }
    .board-item { display: block; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; color: var(--ink-2); cursor: pointer; text-decoration: none; transition: .12s; }
    .board-item:hover { background: var(--surface-2); text-decoration: none; color: var(--ink); }
    .board-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
    .board-item .board-count { float: right; font-size: 12px; color: var(--mut); font-weight: 500; }

    /* Main column */
    .main-col { flex: 1; min-width: 0; }

    /* Sort + search bar */
    .list-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .sort-group { display: flex; gap: 0; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); flex-shrink: 0; }
    .sort-btn { padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--ink-2); background: none; border: none; cursor: pointer; transition: .12s; }
    .sort-btn:hover { background: var(--surface-2); }
    .sort-btn.active { background: var(--accent); color: #fff; }
    .search-wrap { flex: 1; min-width: 140px; position: relative; }
    .search-wrap .icon-search { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--mut); pointer-events: none; font-size: 14px; }
    .search-wrap input { padding-left: 34px; }

    /* Post row */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-row { display: flex; gap: 14px; align-items: flex-start; padding: 16px; cursor: pointer; transition: .12s; }
    .post-row:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .post-body-col { flex: 1; min-width: 0; }
    .post-title { font-weight: 700; font-size: 15px; color: var(--ink); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-snippet { font-size: 13px; color: var(--ink-2); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .meta-item { font-size: 12px; color: var(--mut); display: flex; align-items: center; gap: 4px; }

    /* Status pill */
    .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; color: #fff; }
    .pill::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.7); flex-shrink: 0; }

    /* Post detail */
    .detail-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: var(--ink-2); cursor: pointer; margin-bottom: 20px; padding: 6px 0; }
    .detail-back:hover { color: var(--accent); }
    .detail-header { display: flex; gap: 18px; align-items: flex-start; margin-bottom: 24px; }
    .detail-title-col { flex: 1; min-width: 0; }
    .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    .detail-body { font-size: 15px; color: var(--ink-2); line-height: 1.65; white-space: pre-wrap; margin-bottom: 20px; }
    .detail-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
    .status-reason { background: var(--surface-2); border-left: 3px solid var(--danger); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; color: var(--ink-2); margin-bottom: 18px; }

    /* Comments */
    .comments-section { margin-top: 32px; }
    .comments-section h3 { font-size: 16px; margin-bottom: 16px; }
    .comment-item { display: flex; gap: 12px; margin-bottom: 18px; }
    .comment-body-col { flex: 1; min-width: 0; }
    .comment-meta { font-size: 12px; color: var(--mut); margin-bottom: 4px; }
    .comment-name { font-weight: 700; font-size: 13px; color: var(--ink); margin-right: 6px; }
    .comment-text { font-size: 14px; color: var(--ink-2); white-space: pre-wrap; }
    .comment-official { border-left: 3px solid var(--accent); padding-left: 12px; background: var(--accent-soft); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 12px 12px 12px 14px; }
    .official-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--accent); background: var(--surface); border: 1px solid var(--accent); border-radius: 999px; padding: 2px 8px; margin-left: 6px; }

    /* Add comment box */
    .add-comment { margin-top: 24px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
    .add-comment h4 { font-size: 14px; margin-bottom: 12px; }
    .add-comment .comment-fields { display: flex; gap: 10px; margin-bottom: 10px; }
    .add-comment .comment-fields input { flex: 1; }

    /* Submit modal */
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-header h2 { font-size: 20px; margin: 0; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--mut); font-size: 22px; line-height: 1; padding: 4px; border-radius: var(--radius-sm); }
    .modal-close:hover { background: var(--surface-2); }
    .similar-hits { background: var(--accent-soft); border-radius: var(--radius-sm); padding: 12px; margin: 8px 0 12px; }
    .similar-hits p { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .similar-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 7px 8px; border-radius: var(--radius-sm); cursor: pointer; }
    .similar-item:hover { background: rgba(109,94,252,.12); }
    .similar-item span { font-size: 13px; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .similar-item .votes { font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    /* Identity modal */
    .ident-modal { max-width: 380px; }

    /* Roadmap */
    .road-view { padding: 28px 0 60px; }
    .road-view h2 { margin-bottom: 20px; }
    .road-col h3 { margin-bottom: 12px; font-size: 13px; }
    .road-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: .12s; }
    .road-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .road-card-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .road-card-votes { font-size: 12px; color: var(--mut); display: flex; align-items: center; gap: 4px; }

    /* Changelog */
    .cl-view { padding: 28px 0 60px; max-width: 720px; }
    .cl-entry { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .cl-entry-header { margin-bottom: 12px; }
    .cl-entry-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .cl-entry-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .cl-entry-date { font-size: 13px; color: var(--mut); }
    .cl-label { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); }
    .cl-body { font-size: 15px; color: var(--ink-2); line-height: 1.7; white-space: pre-wrap; }

    /* Skeletons */
    .skel-row { display: flex; gap: 14px; padding: 16px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); }
    .skel-vote { width: 54px; height: 60px; border-radius: var(--radius-sm); flex-shrink: 0; }
    .skel-content { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .skel-line { height: 14px; }
    .skel-line.w60 { width: 60%; }
    .skel-line.w40 { width: 40%; }
    .skel-line.w80 { width: 80%; }

    /* Error inline */
    .err-inline { background: #fff0f0; border: 1px solid #ffcdd2; border-radius: var(--radius-sm); padding: 14px 16px; color: var(--danger); font-size: 14px; font-weight: 500; }

    /* Mobile */
    @media (max-width: 680px) {
      .feedback-layout { flex-direction: column; gap: 14px; }
      .sidebar { width: 100%; display: flex; gap: 6px; flex-wrap: wrap; }
      .sidebar-label { display: none; }
      .board-item { padding: 6px 12px; }
      .topbar .wrap { flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; gap: 8px; }
      .topbar-center { order: 3; width: 100%; }
      .tabs { gap: 2px; }
      .list-toolbar { flex-direction: column; align-items: stretch; }
      .sort-group { justify-content: stretch; }
      .sort-btn { flex: 1; }
      .detail-header { flex-direction: column; }
      .add-comment .comment-fields { flex-direction: column; }
    }

    @media (max-width: 820px) {
      .topbar-ws { display: none; }
    }

    /* overflow safety + mobile sort fit */
    html, body { overflow-x: hidden; max-width: 100%; }
    @media (max-width: 680px) {
      .sort-group { width: 100%; flex-shrink: 1; }
      .sort-btn { flex: 1 1 0; min-width: 0; padding: 8px 6px; font-size: 12px; white-space: nowrap; }
      .post-title, .post-body-col h3, .detail-title-col h1 { overflow-wrap: anywhere; }
    }

    /* Focus visible */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .vote:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="portal-shell" id="app">
    <!-- Topbar -->
    <header class="topbar" role="banner">
      <div class="wrap">
        <div class="topbar-left">
          <a href="#" class="brand" id="brand-link" aria-label="Loopline home">
            <!-- logo-mark SVG inline -->
            <svg class="logo-mark" viewBox="0 0 26 26" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="9.5" cy="9.5" rx="7" ry="7" stroke="currentColor" stroke-width="2.2" fill="none"/>
              <ellipse cx="16.5" cy="16.5" rx="7" ry="7" stroke="currentColor" stroke-width="2.2" fill="none" opacity=".65"/>
            </svg>
            Loopline
          </a>
          <span class="topbar-ws" id="ws-name" aria-label="Workspace name"></span>
        </div>
        <nav class="topbar-center tabs" role="navigation" aria-label="Portal views" id="main-tabs">
          <a href="?view=feedback" class="tab" data-view="feedback" role="tab" aria-selected="false">Feedback</a>
          <a href="?view=roadmap" class="tab" data-view="roadmap" role="tab" aria-selected="false">Roadmap</a>
          <a href="?view=changelog" class="tab" data-view="changelog" role="tab" aria-selected="false">Changelog</a>
        </nav>
        <div class="topbar-right">
          <button class="btn btn-primary btn-sm" id="btn-give-feedback" type="button">
            + Give feedback
          </button>
        </div>
      </div>
    </header>

    <!-- Main content region -->
    <main id="main-view" role="main" aria-live="polite" aria-label="Portal content">
      <!-- Rendered by portal.js -->
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Submit feedback modal -->
  <div class="modal-bg hide" id="modal-submit" role="dialog" aria-modal="true" aria-labelledby="submit-modal-title">
    <div class="modal">
      <div class="modal-p">
        <div class="modal-header">
          <h2 id="submit-modal-title">Give feedback</h2>
          <button class="modal-close" id="btn-close-submit" type="button" aria-label="Close modal">&times;</button>
        </div>
        <form id="form-submit" novalidate>
          <div class="field">
            <label for="sf-board">Board</label>
            <select id="sf-board" name="board" required></select>
          </div>
          <div class="field">
            <label for="sf-title">Title <span style="color:var(--danger)">*</span></label>
            <input type="text" id="sf-title" name="title" placeholder="Short, clear summary…" autocomplete="off" maxlength="200" required />
            <div class="err-inline hide" id="sf-title-err" role="alert" style="margin-top:6px;"></div>
          </div>

          <!-- Similar posts panel -->
          <div class="similar-hits hide" id="similar-panel" aria-live="polite">
            <p>Already requested? Upvote instead:</p>
            <div id="similar-list"></div>
          </div>

          <div class="field">
            <label for="sf-body">Details <span class="muted small">(optional)</span></label>
            <textarea id="sf-body" name="body" placeholder="More context helps the team prioritize…" rows="4"></textarea>
          </div>
          <div class="field">
            <label for="sf-email">Your email <span style="color:var(--danger)">*</span></label>
            <input type="email" id="sf-email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="sf-name">Your name <span class="muted small">(optional)</span></label>
            <input type="text" id="sf-name" name="name" placeholder="Jane Smith" autocomplete="name" />
          </div>
          <div class="err-inline hide" id="sf-form-err" role="alert" style="margin-bottom:12px;"></div>
          <div style="display:flex;gap:10px;justify-content:flex-end;">
            <button type="button" class="btn btn-ghost" id="btn-cancel-submit">Cancel</button>
            <button type="submit" class="btn btn-primary" id="btn-submit-post">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Identity capture modal (email + name) -->
  <div class="modal-bg hide" id="modal-ident" role="dialog" aria-modal="true" aria-labelledby="ident-modal-title">
    <div class="modal ident-modal">
      <div class="modal-p">
        <div class="modal-header">
          <h2 id="ident-modal-title" style="font-size:18px;">Who's voting?</h2>
          <button class="modal-close" id="btn-close-ident" type="button" aria-label="Close">&times;</button>
        </div>
        <p style="font-size:14px;margin-bottom:16px;">We need your email so your vote is counted once. No spam — promise.</p>
        <form id="form-ident" novalidate>
          <div class="field">
            <label for="id-email">Email <span style="color:var(--danger)">*</span></label>
            <input type="email" id="id-email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="id-name">Name <span class="muted small">(optional)</span></label>
            <input type="text" id="id-name" placeholder="Jane Smith" autocomplete="name" />
          </div>
          <div class="err-inline hide" id="id-err" role="alert" style="margin-bottom:12px;"></div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Vote</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/sb.js"></script>
  <script src="assets/portal.js"></script>
</body>
</html>
